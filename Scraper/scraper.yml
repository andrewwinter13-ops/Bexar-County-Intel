name: Scrape County Records

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          pip install selenium webdriver-manager requests beautifulsoup4

      - name: Run scraper
        run: python Scraper/scraper.py

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update leads ${{ github.run_id }}"
          file_pattern: "Scraper/output.json Scraper/index.html"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Summary
        run: |
          echo "## Scrape Complete" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python -c "import json; d=json.load(open('Scraper/output.json')); print(d['total_records'])")
          LIVE=$(python -c "import json; d=json.load(open('Scraper/output.json')); print(d.get('live_data', False))")
          HOT=$(python -c "import json; d=json.load(open('Scraper/output.json')); print(sum(1 for r in d['records'] if r['seller_score']>=50))")
          WARM=$(python -c "import json; d=json.load(open('Scraper/output.json')); print(sum(1 for r in d['records'] if 25<=r['seller_score']<50))")
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Live data | $LIVE |" >> $GITHUB_STEP_SUMMARY
          echo "| Total records | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Hot leads | $HOT |" >> $GITHUB_STEP_SUMMARY
          echo "| Warm leads | $WARM |" >> $GITHUB_STEP_SUMMARY
